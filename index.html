<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TRADING MODUL</title>
  <meta name="description" content="Koleksi video pribadi berbasis Google Drive" />
  <link rel="stylesheet" href="style.css" />

  <!--
    ╔══════════════════════════════════════════════════════╗
    ║  Untuk menambah/menghapus video: edit  videos.js     ║
    ║  Refresh browser setelah menyimpan perubahan.        ║
    ╚══════════════════════════════════════════════════════╝
  -->
  <script src="videos.js"></script>
</head>
<body>

  <!-- ══ HEADER ══ -->
  <header class="site-header">
    <div class="header-inner">
      <a class="site-logo" href="#">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M21 3H3C1.9 3 1 3.9 1 5v14c0 1.1.9 2 2 2h18c1.1 0
            2-.9 2-2V5c0-1.1-.9-2-2-2zm-9 13l-7-4 7-4v8z"/>
        </svg>
        TRADING MODUL
      </a>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <path d="M21 21l-4.35-4.35"/>
        </svg>
        <input
          type="text"
          class="search-input"
          id="searchInput"
          placeholder="Cari video atau tag..."
          autocomplete="off"
        />
      </div>

      <div class="header-meta" id="headerMeta">—</div>
    </div>
  </header>

  <!-- ══ MAIN ══ -->
  <main class="main-wrap">

    <div class="section-header">
      <h1 class="section-title">MODUL <span>VIDEO</span></h1>
      <div class="video-count" id="videoCount">— VIDEO</div>
    </div>

    <!-- Tag Filter Bar -->
    <div class="filter-bar" id="filterBar">
      <span class="filter-label">FILTER :</span>
    </div>

    <!-- Active filter summary + reset -->
    <div class="filter-active-bar" id="filterActiveBar" style="display:none;">
      <span class="filter-active-label" id="filterActiveLabel"></span>
      <button class="filter-reset-btn" id="filterResetBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" width="11" height="11">
          <path d="M18 6L6 18M6 6l12 12"/>
        </svg>
        RESET FILTER
      </button>
    </div>

    <!-- Grid -->
    <div class="video-grid" id="videoGrid">
      <div class="loading-state">
        <div class="spinner"></div>
        <span class="loading-text">Memuat Koleksi Video</span>
      </div>
    </div>

  </main>

  <!-- ══ FOOTER ══ -->
  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-logo">TRADING MODUL</span>
      <span class="footer-note" id="footerNote">—</span>
    </div>
  </footer>

  <!-- ══ MODAL ══ -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title" id="modalTitle">—</span>
        <div class="modal-tags" id="modalTags"></div>
        <button class="modal-close" id="modalClose" aria-label="Tutup video">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div class="modal-video-wrap">
        <iframe
          id="modalIframe"
          src=""
          allow="autoplay; encrypted-media; picture-in-picture"
          allowfullscreen
          title="Video Player"
        ></iframe>
      </div>
      <div class="modal-footer">
        <a class="modal-open-btn" id="modalOpenLink" href="#" target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/>
            <polyline points="15 3 21 3 21 9"/>
            <line x1="10" y1="14" x2="21" y2="3"/>
          </svg>
          BUKA DI GOOGLE DRIVE
        </a>
        <span class="modal-hint">Tekan ESC untuk menutup</span>
      </div>
    </div>
  </div>

  <!-- ══ MAIN SCRIPT ══ -->
  <script>
  (() => {
    'use strict';

    /* ── State ── */
    let allVideos   = [];
    let activeTags  = new Set();   // ← multi-select: Set of active tag strings
    let searchQuery = '';

    /* ── DOM ── */
    const elGrid        = document.getElementById('videoGrid');
    const elFilter      = document.getElementById('filterBar');
    const elCount       = document.getElementById('videoCount');
    const elMeta        = document.getElementById('headerMeta');
    const elFooter      = document.getElementById('footerNote');
    const elSearch      = document.getElementById('searchInput');
    const elOverlay     = document.getElementById('modalOverlay');
    const elIframe      = document.getElementById('modalIframe');
    const elMTitle      = document.getElementById('modalTitle');
    const elMTags       = document.getElementById('modalTags');
    const elMClose      = document.getElementById('modalClose');
    const elMLink       = document.getElementById('modalOpenLink');
    const elActiveBar   = document.getElementById('filterActiveBar');
    const elActiveLabel = document.getElementById('filterActiveLabel');
    const elResetBtn    = document.getElementById('filterResetBtn');

    /* ── Helpers ── */
    function driveId(url) {
      if (!url) return null;
      let m;
      m = url.match(/\/file\/d\/([a-zA-Z0-9_-]{15,})/);
      if (m) return m[1];
      m = url.match(/[?&]id=([a-zA-Z0-9_-]{15,})/);
      if (m) return m[1];
      m = url.match(/\/open\?id=([a-zA-Z0-9_-]{15,})/);
      if (m) return m[1];
      return null;
    }

    const thumbUrl = id => 'https://drive.google.com/thumbnail?id=' + id + '&sz=w480';
    const embedUrl = id => 'https://drive.google.com/file/d/' + id + '/preview';

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = String(s);
      return d.innerHTML;
    }

    /* ── Proses VIDEO_LIST ── */
    function processVideoList(raw) {
      if (!Array.isArray(raw)) return [];
      return raw.map((item, i) => {
        if (!item || typeof item !== 'object') return null;
        const link = String(item.link || '').trim();
        const id   = driveId(link);
        if (!id) return null;
        const title = String(item.title || ('Video ' + (i + 1))).trim();
        const tags  = Array.isArray(item.tags)
          ? item.tags.map(t => String(t).trim().toLowerCase()).filter(Boolean)
          : [];
        return { link, id, title, tags };
      }).filter(Boolean);
    }

    /* ── Filter Bar ── */
    function renderFilterBar() {
      const tagSet = new Set();
      allVideos.forEach(v => v.tags.forEach(t => tagSet.add(t)));
      const tags = Array.from(tagSet).sort();

      elFilter.innerHTML = '<span class="filter-label">FILTER :</span>';

      // "Semua" button — active only when nothing selected
      const allBtn = buildTagBtn('__all__', 'Semua', activeTags.size === 0);
      allBtn.addEventListener('click', () => {
        activeTags.clear();
        refreshTagButtons();
        applyFilters();
      });
      elFilter.appendChild(allBtn);

      tags.forEach(tag => {
        const btn = buildTagBtn(tag, tag, activeTags.has(tag));
        btn.addEventListener('click', () => {
          if (activeTags.has(tag)) {
            activeTags.delete(tag);
          } else {
            activeTags.add(tag);
          }
          refreshTagButtons();
          applyFilters();
        });
        elFilter.appendChild(btn);
      });
    }

    function buildTagBtn(value, label, isActive) {
      const btn = document.createElement('button');
      btn.className = 'tag-btn' + (isActive ? ' active' : '');
      btn.dataset.tag = value;
      btn.innerHTML = '<span class="tag-dot"></span>' + esc(label);
      return btn;
    }

    // Sync all button active states to current activeTags Set
    function refreshTagButtons() {
      document.querySelectorAll('.tag-btn').forEach(btn => {
        const val = btn.dataset.tag;
        if (val === '__all__') {
          btn.classList.toggle('active', activeTags.size === 0);
        } else {
          btn.classList.toggle('active', activeTags.has(val));
        }
      });
      updateActiveBar();
    }

    // Show/hide the "active filter" summary bar
    function updateActiveBar() {
      if (activeTags.size === 0) {
        elActiveBar.style.display = 'none';
      } else {
        elActiveBar.style.display = 'flex';
        const labels = Array.from(activeTags).map(t =>
          '<span class="active-tag-chip">' + esc(t) + '</span>'
        ).join('');
        elActiveLabel.innerHTML =
          '<span class="active-tag-count">' + activeTags.size + ' FILTER AKTIF :</span> ' + labels;
      }
    }

    // Reset button
    elResetBtn.addEventListener('click', () => {
      activeTags.clear();
      refreshTagButtons();
      applyFilters();
    });

    /* ── Cards ── */
    function renderCards(list) {
      elGrid.innerHTML = '';
      if (!list.length) {
        elGrid.innerHTML = `
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
            </svg>
            <h3>TIDAK DITEMUKAN</h3>
            <p>Tidak ada video yang cocok dengan filter atau pencarian ini.</p>
          </div>`;
        return;
      }
      list.forEach((v, i) => elGrid.appendChild(buildCard(v, i)));
    }

    function buildCard(video, idx) {
      const card = document.createElement('div');
      card.className = 'video-card';
      card.style.animationDelay = Math.min(idx * 55, 420) + 'ms';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', 'Putar: ' + video.title);

      const tagsHtml = video.tags.length
        ? video.tags.map(t =>
            '<span class="card-tag' + (activeTags.has(t) ? ' highlight' : '') + '">' + esc(t) + '</span>'
          ).join('')
        : '<span class="card-tag" style="opacity:.35">—</span>';

      const sk = 'sk' + idx;
      card.innerHTML = `
        <div class="card-thumb">
          <div class="thumb-skeleton" id="${sk}"></div>
          <img
            src="${thumbUrl(video.id)}"
            alt="${esc(video.title)}"
            loading="lazy"
            onload="(function(){var e=document.getElementById('${sk}');if(e)e.style.display='none';})()"
            onerror="(function(){this.style.opacity='0.12';var e=document.getElementById('${sk}');if(e)e.style.animation='none';})()"
          />
          <div class="play-overlay">
            <div class="play-btn-circle">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
        </div>
        <div class="card-info">
          <div class="card-title">${esc(video.title)}</div>
          <div class="card-tags">${tagsHtml}</div>
        </div>`;

      const open = () => openModal(video);
      card.addEventListener('click', open);
      card.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
      });
      return card;
    }

    /* ── Filter & Search ── */
    function applyFilters() {
      let res = allVideos;

      // AND logic: video harus punya SEMUA tag yang dipilih
      if (activeTags.size > 0) {
        res = res.filter(v =>
          Array.from(activeTags).every(t => v.tags.includes(t))
        );
      }

      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        res = res.filter(v =>
          v.title.toLowerCase().includes(q) || v.tags.some(t => t.includes(q))
        );
      }

      elCount.textContent = res.length + ' VIDEO';
      renderCards(res);
    }

    let sTimer;
    elSearch.addEventListener('input', () => {
      clearTimeout(sTimer);
      sTimer = setTimeout(() => { searchQuery = elSearch.value.trim(); applyFilters(); }, 200);
    });

    /* ── Modal ── */
    function openModal(video) {
      elMTitle.textContent = video.title;
      elIframe.src = embedUrl(video.id);
      elMLink.href = video.link;
      elMTags.innerHTML = video.tags.map(t => '<span class="modal-tag">' + esc(t) + '</span>').join('');
      elOverlay.classList.add('open');
      document.body.style.overflow = 'hidden';
      elMClose.focus();
    }

    function closeModal() {
      elOverlay.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { elIframe.src = ''; }, 280);
    }

    elMClose.addEventListener('click', closeModal);
    elOverlay.addEventListener('click', e => { if (e.target === elOverlay) closeModal(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && elOverlay.classList.contains('open')) closeModal();
    });

    /* ── Init ── */
    function init() {
      if (typeof VIDEO_LIST === 'undefined' || !Array.isArray(VIDEO_LIST)) {
        elGrid.innerHTML = `
          <div class="error-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div>
              <strong>File videos.js tidak ditemukan atau tidak valid.</strong><br>
              Pastikan <code>videos.js</code> ada di folder yang sama dengan <code>index.html</code>
              dan berisi variabel <code>var VIDEO_LIST = [...];</code>
            </div>
          </div>`;
        elMeta.textContent = 'ERROR';
        return;
      }

      allVideos = processVideoList(VIDEO_LIST);

      if (!allVideos.length) {
        elGrid.innerHTML = `
          <div class="error-banner">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div>
              <strong>Tidak ada video valid ditemukan.</strong><br>
              Periksa bahwa setiap entri di <code>videos.js</code> memiliki
              properti <code>link</code> berupa URL Google Drive yang valid
              (contoh: <code>https://drive.google.com/file/d/ID/view</code>).
            </div>
          </div>`;
        elMeta.textContent = '0 VIDEO';
        return;
      }

      const tagCount = new Set(allVideos.flatMap(v => v.tags)).size;
      elMeta.textContent   = allVideos.length + ' VIDEO · ' + tagCount + ' TAG';
      elFooter.textContent = allVideos.length + ' video dimuat dari videos.js';

      renderFilterBar();
      elCount.textContent = allVideos.length + ' VIDEO';
      renderCards(allVideos);
    }

    if (document.readyState === 'loading')
      document.addEventListener('DOMContentLoaded', init);
    else
      init();

  })();
  </script>

</body>
</html>
